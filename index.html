<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Pi Camera Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">🏠 Remote Pi Camera</span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm" style="display: none;">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Login Section -->
        <div id="loginSection" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>🔐 Connect to Pi Camera</h4>
                    </div>
                    <div class="card-body">
                        <form id="setupForm">
                            <div class="mb-3">
                                <label for="piIpAddress" class="form-label">Pi IP Address</label>
                                <input type="text" class="form-control" id="piIpAddress" placeholder="192.168.1.100" required>
                                <small class="form-text text-muted">Your Raspberry Pi's local IP address</small>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" value="admin" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Connect to Pi Camera</button>
                        </form>
                        <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" style="display: none;">
            <div class="row">
                <!-- Live Feed -->
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5>📹 Live Feed</h5>
                            <div>
                                <button id="startRecordingBtn" class="btn btn-success btn-sm">▶️ Start Recording</button>
                                <button id="stopRecordingBtn" class="btn btn-danger btn-sm" disabled>⏹️ Stop Recording</button>
                            </div>
                        </div>
                        <div class="card-body text-center">
                            <img id="videoFeed" class="video-feed" alt="Camera Feed" style="display: none;">
                            <div id="videoLoading" class="text-muted">
                                <div class="spinner-border" role="status"></div>
                                <p>Connecting to camera...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Panel -->
                <div class="col-lg-4">
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5>📊 System Status</h5>
                        </div>
                        <div class="card-body">
                            <div id="systemStatus">
                                <p><strong>Connection:</strong> <span id="connectionStatus" class="text-warning">Connecting...</span></p>
                                <p><strong>Recording:</strong> <span id="recordingStatus">Inactive</span></p>
                                <p><strong>Storage:</strong> <span id="storageStatus">Loading...</span></p>
                                <p><strong>Memory:</strong> <span id="memoryStatus">Loading...</span></p>
                                <p><strong>Camera:</strong> <span id="cameraStatus">Loading...</span></p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h5>📁 Recent Recordings</h5>
                        </div>
                        <div class="card-body">
                            <div id="recordingsList">
                                <p class="text-muted">Loading recordings...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
